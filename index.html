<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Se1Schools2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:#121820; --soft:#3a4553; --mute:#6b7785; --line:#dde3ea;
      --bg:#eef1f4; --panel:#fff; --navy:#153552; --navy2:#0f2740;
      --teal:#0a7a7e; --teal-bg:#e5f5f5; --amber:#b45309; --amber-bg:#fef3e2;
      --rose:#be123c; --rose-bg:#fce7ef; --scarlet:#ff0033; --scarlet-bg:#ffe5ea;
      --violet:#5b21b6; --violet-bg:#f3eefc; --green:#15803d; --green-bg:#e8f7ee;
      --r:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:"DM Sans",system-ui,sans-serif;font-size:13.5px;line-height:1.4;color:var(--ink);background:var(--bg)}
    a{color:var(--teal);text-underline-offset:2px} a:hover{color:var(--navy)}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:.92em}

    /* Full-width shell + top nav (mobile friendly) */
    .topbar{
      position:sticky;top:0;z-index:50;
      background:var(--navy2);color:#c8d6e4;
      display:flex;flex-wrap:wrap;align-items:center;gap:.5rem .75rem;
      padding:.55rem .9rem;border-bottom:1px solid rgba(255,255,255,.08);
    }
    .topbar h1{font-size:.95rem;font-weight:700;color:#fff;letter-spacing:-.02em;margin-right:.5rem}
    .topbar .meta{font-size:.7rem;color:#8fa3b8}
    .nav{display:flex;flex-wrap:wrap;gap:.3rem;flex:1}
    .nav-btn{
      border:0;background:transparent;color:#b8c9d9;font:inherit;font-size:.78rem;font-weight:600;
      padding:.4rem .7rem;border-radius:8px;cursor:pointer;
    }
    .nav-btn:hover{background:rgba(255,255,255,.08);color:#fff}
    .nav-btn.active{background:var(--teal);color:#fff}
    .save-pill{
      margin-left:auto;font-size:.68rem;font-weight:600;color:#8fa3b8;
      padding:.25rem .55rem;border-radius:999px;background:rgba(255,255,255,.06);
      white-space:nowrap;max-width:100%;
    }
    .save-pill.ok{color:#86efac}
    .save-pill.warn{color:#fcd34d}
    .save-pill.err{color:#fca5a5}

    .main{width:100%;max-width:none;padding:.75rem 1rem 2.5rem}
    .panel{display:none}.panel.active{display:block}

    .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:.35rem .5rem;margin-bottom:.55rem}
    .btn{
      display:inline-flex;align-items:center;gap:.25rem;font-size:.7rem;font-weight:700;
      padding:.3rem .55rem;border-radius:6px;border:1px solid var(--line);background:var(--panel);
      color:var(--navy);cursor:pointer;font-family:inherit;text-decoration:none;white-space:nowrap;
    }
    .btn:hover{border-color:var(--teal);color:var(--teal)}
    .btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
    .btn-primary:hover{background:#086568;color:#fff}
    .btn-warn{background:var(--rose);color:#fff;border-color:var(--rose)}

    .section-label{
      font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
      color:var(--mute);margin:1rem 0 .4rem;
    }
    .table-wrap{
      overflow-x:auto;-webkit-overflow-scrolling:touch;
      background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
      width:100%;
    }
    table{width:100%;border-collapse:collapse;font-size:.74rem;min-width:980px}
    th{
      text-align:left;background:var(--navy);color:#e8f0f6;font-size:.62rem;font-weight:700;
      letter-spacing:.03em;text-transform:uppercase;padding:.5rem .45rem;white-space:nowrap;user-select:none;
      position:relative;
    }
    th.sortable{cursor:pointer} th.sortable:hover{background:#1c4568}
    th .tip{
      display:inline-flex;align-items:center;justify-content:center;
      width:.9rem;height:.9rem;margin-left:.2rem;border-radius:50%;
      background:rgba(255,255,255,.18);font-size:.55rem;font-weight:700;cursor:help;vertical-align:middle;
    }
    th[data-tip], .th-tip{position:relative}
    th[data-tip]:hover::after, .has-tip:hover::after{
      content:attr(data-tip);
      position:absolute;left:0;top:100%;z-index:40;margin-top:.25rem;
      background:#0f172a;color:#f1f5f9;font-size:.68rem;font-weight:500;letter-spacing:0;
      text-transform:none;line-height:1.35;padding:.45rem .55rem;border-radius:6px;
      width:min(240px,70vw);box-shadow:0 8px 24px rgba(0,0,0,.25);white-space:normal;pointer-events:none;
    }
    th.sortable .sort-ind{opacity:.45;margin-left:.1rem;font-size:.7em}
    th.sortable.asc .sort-ind,th.sortable.desc .sort-ind{opacity:1;color:#5eead4}
    th.sortable.asc .sort-ind::after{content:" ▲"} th.sortable.desc .sort-ind::after{content:" ▼"}
    th.sortable:not(.asc):not(.desc) .sort-ind::after{content:" ⇅"}
    td{padding:.42rem .45rem;border-bottom:1px solid var(--line);vertical-align:top;color:var(--soft)}
    tr:last-child td{border-bottom:0}
    tbody tr:nth-child(even) td{background:#f8fafb}
    tbody tr:hover td{background:#f0f7f7}
    td.school{font-weight:700;color:var(--ink);min-width:8.5rem}
    td.school .short{display:block;font-weight:500;font-size:.65rem;color:var(--mute)}
    .tests-cell{max-width:13rem;line-height:1.35;font-size:.71rem}
    .extra-cell{max-width:11rem;line-height:1.35;font-size:.7rem;color:var(--mute)}

    .badge{display:inline-block;font-size:.54rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:.08rem .3rem;border-radius:4px;margin:0 .08rem .08rem 0}
    .b-state{background:var(--teal-bg);color:var(--teal)} .b-ind{background:var(--violet-bg);color:var(--violet)}
    .b-fr{background:var(--amber-bg);color:var(--amber)} .b-boys{background:#eef2f6;color:var(--soft)}
    .b-warn{background:var(--rose-bg);color:var(--rose)} .b-ok{background:var(--green-bg);color:var(--green)}
    .b-intl{background:#e0e7ff;color:#3730a3}

    .score{display:inline-flex;align-items:baseline;gap:.1rem;font-family:"JetBrains Mono",monospace;font-weight:600;font-size:.84rem}
    .score small{font-size:.6rem;color:var(--mute);font-weight:500}
    .bar{height:5px;border-radius:3px;background:#e5e9ee;margin-top:.2rem;overflow:hidden;min-width:44px}
    .bar>i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--teal),#0d9488)}
    .bar.lik>i{background:linear-gradient(90deg,#0369a1,#0ea5e9)}
    .bar.prep>i{background:linear-gradient(90deg,var(--amber),#f59e0b)}
    .bar.prep.high>i{background:linear-gradient(90deg,var(--rose),#f43f5e)}
    .commute-long{color:var(--scarlet)!important;font-weight:700;background:var(--scarlet-bg);padding:.1rem .3rem;border-radius:4px;display:inline-block}
    .fees{font-weight:700;padding:.1rem .3rem;border-radius:4px;display:inline-block}
    .fees-free{color:var(--green);background:var(--green-bg)}

    .pref-cell{display:flex;align-items:center;gap:.25rem;min-width:3.8rem}
    .pref-num{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:.92rem;color:var(--navy);width:1.25rem;text-align:center}
    .pref-arrows{display:flex;flex-direction:column;gap:1px}
    .pref-arrows button{
      width:1.25rem;height:.95rem;border:1px solid var(--line);background:#fff;border-radius:3px;
      cursor:pointer;color:var(--navy);font-size:.5rem;line-height:1;padding:0;display:grid;place-items:center;
    }
    .pref-arrows button:hover:not(:disabled){background:var(--teal-bg);border-color:var(--teal)}
    .pref-arrows button:disabled{opacity:.3;cursor:not-allowed}

    /* Plan = timeline + checklist */
    .plan{display:grid;gap:.45rem;max-width:920px}
    .tl{
      display:grid;grid-template-columns:auto 6.5rem 1fr;gap:.55rem;align-items:start;
      background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.55rem .7rem;
    }
    .tl.crit{border-color:#f0b4c4;background:#fff8f9}
    .tl.ind{border-color:#d4c4f5;background:#fbf8ff}
    .tl input[type=checkbox]{width:1.05rem;height:1.05rem;margin-top:.15rem;accent-color:var(--teal);cursor:pointer}
    .tl .when{font-family:"JetBrains Mono",monospace;font-size:.7rem;font-weight:600;color:var(--teal);padding-top:.15rem}
    .tl.crit .when{color:var(--rose)} .tl.ind .when{color:var(--violet)}
    .tl .what{font-size:.8rem;color:var(--soft)}
    .tl .what strong{color:var(--ink)}
    .tl.done{opacity:.55}
    .tl.done .what{text-decoration:line-through}
    .tl .hint{display:block;font-size:.7rem;color:var(--mute);margin-top:.2rem}

    /* Comments */
    .comment-form{
      background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
      padding:.85rem;margin-bottom:.85rem;max-width:720px;
    }
    .comment-form label{display:block;font-size:.72rem;font-weight:700;color:var(--mute);margin-bottom:.25rem}
    .comment-form input,.comment-form textarea{
      width:100%;font:inherit;padding:.45rem .55rem;border:1px solid var(--line);border-radius:8px;
      margin-bottom:.55rem;background:#fff;color:var(--ink);
    }
    .comment-form textarea{min-height:5.5rem;resize:vertical}
    .comments{display:grid;gap:.5rem;max-width:720px}
    .comment{
      background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.65rem .8rem;
    }
    .comment .who{font-size:.72rem;font-weight:700;color:var(--navy)}
    .comment .when{font-size:.65rem;color:var(--mute);font-family:"JetBrains Mono",monospace}
    .comment .body{font-size:.8rem;color:var(--soft);margin-top:.3rem;white-space:pre-wrap}
    .empty{font-size:.8rem;color:var(--mute);padding:.5rem 0}

    @media(max-width:700px){
      .topbar{padding:.5rem .65rem}
      .main{padding:.55rem .55rem 2rem}
      .tl{grid-template-columns:auto 1fr;gap:.4rem}
      .tl .when{grid-column:2}
      table{min-width:860px;font-size:.7rem}
      th[data-tip]:hover::after{left:auto;right:0}
    }
    @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
  </style>
</head>
<body>
  <header class="topbar">
    <h1>Se1Schools2027</h1>
    <span class="meta">SE17 1BS</span>
    <nav class="nav" aria-label="Main">
      <button type="button" class="nav-btn active" data-tab="overview">Shortlist</button>
      <button type="button" class="nav-btn" data-tab="plan">Plan</button>
      <button type="button" class="nav-btn" data-tab="comments">Comments</button>
    </nav>
    <div class="save-pill" id="save-pill" title="Autosave status">…</div>
  </header>

  <main class="main">
    <!-- SHORTLIST (dashboard + compare merged) -->
    <section id="overview" class="panel active">
      <div class="toolbar">
        <button type="button" class="btn" id="btn-sort-pref">Preference</button>
        <button type="button" class="btn" id="btn-sort-quality">Quality ↓</button>
        <button type="button" class="btn" id="btn-reset-pref">Reset pref</button>
      </div>

      <div class="table-wrap">
        <table id="dash-table">
          <thead>
            <tr>
              <th class="sortable asc" data-key="pref" data-type="num" data-tip="Your family ranking (1 = top choice). Use ▲▼ to reorder. Shared for everyone on this link.">Pref <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="name" data-type="str" data-tip="School name, type badges, and location short note.">School <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="tests" data-type="str" data-tip="How you apply and what tests apply: CAF, banding, specialist aptitude, 11+ exams, or dossier.">Admission / tests <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="open" data-type="str" data-tip="Published open days / tours for the autumn 2026 cycle (where known).">Open days <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="deadline" data-type="str" data-tip="Hard application or registration deadlines for 2027 entry.">Deadline <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="scholar" data-type="str" data-tip="Scholarships, prizes, or specialist place routes (entry or post-offer).">Scholarships <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="quality" data-type="num" data-tip="Family estimate /100 of overall school quality: outcomes, reputation, co-curricular breadth. Not an Ofsted score.">Quality <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="admit" data-type="num" data-tip="Rough chance /100 of an offer from SE17 1BS + applicant profile. Not a guarantee.">Admit <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="prep" data-type="num" data-tip="Prep load /100 = how much work the family needs before assessments. Low (~15–30): CAF / light banding only. Medium (~35–50): specialist or dossier. High (~85–95): full selective 11+ (papers, timed practice, often tutoring).">Prep <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="dist" data-type="num" data-tip="Straight-line distance from home postcode SE17 1BS (approx. miles).">Dist <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="commute" data-type="num" data-tip="Average door-to-door school-run minutes from SE17 1BS (walk/bus/tube blend). Over 40′ highlighted scarlet.">Commute <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="fees" data-type="num" data-tip="Annual fees 2026–27 where applicable. Free = state. Colour scale: green (free/low) → amber → red (high).">Fees /yr <span class="tip">?</span><span class="sort-ind"></span></th>
              <th data-tip="Links to apply, register, or school admissions pages.">Apply <span class="tip">?</span></th>
            </tr>
          </thead>
          <tbody id="dash-body"></tbody>
        </table>
      </div>

      <div class="section-label">Alternatives</div>
      <div class="toolbar">
        <button type="button" class="btn" id="btn-alt-quality">Quality ↓</button>
        <button type="button" class="btn" id="btn-alt-commute">Commute ↑</button>
      </div>
      <div class="table-wrap">
        <table id="alt-table">
          <thead>
            <tr>
              <th class="sortable desc" data-key="quality" data-type="num" data-tip="Same quality scale as main shortlist (/100 family estimate).">Quality <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="name" data-type="str" data-tip="Not on the main shortlist — backups and stretch options.">School <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="why" data-type="str" data-tip="Why this school might still be worth a look.">Why <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="tests" data-type="str" data-tip="Admission route / tests.">Admission / tests <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="admit" data-type="num" data-tip="Rough offer chance /100 from SE17.">Admit <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="prep" data-type="num" data-tip="Prep load /100: effort before tests (low CAF → high 11+).">Prep <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="dist" data-type="num" data-tip="Miles from SE17 1BS.">Dist <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="commute" data-type="num" data-tip="Average minutes; &gt;40′ in scarlet.">Commute <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="fees" data-type="num" data-tip="Annual fees; colour scale free→expensive.">Fees /yr <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="notes" data-type="str" data-tip="Optional fit notes for the applicant.">Notes <span class="tip">?</span><span class="sort-ind"></span></th>
            </tr>
          </thead>
          <tbody id="alt-body"></tbody>
        </table>
      </div>
    </section>

    <!-- PLAN = timeline + checklist -->
    <section id="plan" class="panel">
      <div class="toolbar">
        <button type="button" class="btn" id="btn-check-clear">Clear ticks</button>
      </div>
      <div class="plan" id="plan-list"></div>
    </section>

    <!-- COMMENTS -->
    <section id="comments" class="panel">
      <div class="comment-form">
        <label for="c-name">Name (optional)</label>
        <input id="c-name" type="text" maxlength="80" placeholder="e.g. Paul" autocomplete="name" />
        <label for="c-text">Comment</label>
        <textarea id="c-text" maxlength="4000" placeholder="Feedback, corrections, ideas to improve this tool…"></textarea>
        <button type="button" class="btn btn-primary" id="btn-comment">Post comment</button>
      </div>
      <div class="comments" id="comments-list"></div>
    </section>
  </main>

      apply:'<a class="btn btn-primary" href="https://www.lyceefrancais.org.uk/sinscrire/cursus-britannique/" target="_blank" rel="noopener">British</a>',badges:"fr intl"},

      apply:'<a class="btn btn-primary" href="https://www.cityoflondonschool.org.uk/11-entry-registration-form/" target="_blank" rel="noopener">Register</a>',badges:"ind boys"}

  var ALTS = [
    {id:"charter",name:"The Charter School East Dulwich",short:"SE22 · co-ed",why:"Local comprehensive; Harris ED peer",tests:"CAF · no 11+",quality:82,admit:55,prep:15,dist:3.0,commute:32,fees:0,feesLabel:"Free",notes:"Backup if Harris distance tight"},
    {id:"alleyns",name:"Alleyn's School",short:"SE22 · co-ed independent",why:"Dulwich triangle co-ed vs DC/CLS",tests:"11+ · scholarships",quality:93,admit:30,prep:88,dist:3.5,commute:35,fees:30000,feesLabel:"~£30k+",notes:"Similar prep; co-ed"},
    {id:"whitgift",name:"Whitgift School",short:"Croydon · boys",why:"Sport/music scholarships",tests:"11+ · scholarships",quality:90,admit:28,prep:85,dist:8.5,commute:55,fees:28000,feesLabel:"~£28–32k",notes:"Football/piano; long commute"},
    {id:"trinity",name:"Trinity School Croydon",short:"Croydon · boys",why:"Academic + sport",tests:"11+ · scholarships",quality:89,admit:30,prep:85,dist:8.0,commute:52,fees:27000,feesLabel:"~£27–30k",notes:"Stretch; long commute"},
    {id:"ejm",name:"École Jeannine Manuel London",short:"Bilingual FR/EN",why:"Bilingual alt to CdG",tests:"Assessment · dossier",quality:88,admit:40,prep:50,dist:5.0,commute:42,fees:25000,feesLabel:"~£20–30k",notes:"Not full AEFE French track"},
    {id:"wil",name:"Lycée International Winston Churchill",short:"Wembley · AEFE",why:"Other London AEFE",tests:"Dossier / track tests",quality:84,admit:50,prep:40,dist:10.0,commute:60,fees:15000,feesLabel:"~£15k",notes:"Longer than South Ken"},
    {id:"wilsons",name:"Wilson's School (Sutton)",short:"Boys grammar",why:"Selective state stretch",tests:"SET / selective 11+",quality:95,admit:18,prep:92,dist:9.5,commute:58,fees:0,feesLabel:"Free",notes:"High prep; long from SE17"},
    {id:"kcs",name:"King's College School Wimbledon",short:"Boys independent",why:"Top-tier stretch",tests:"11+ highly selective",quality:97,admit:15,prep:95,dist:7.5,commute:52,fees:32000,feesLabel:"~£32k+",notes:"Full 11+ circuit only"}
  ];

  /* Plan items: timeline + checklist merged (checkId links to shared ticks) */
  var PLAN = [
    {id:"c1",when:"11 Sep 2026",cls:"crit",label:"Chestnut specialist form (MFL ± Art)",hint:"Midday deadline · FR/DE advantage on MFL aptitude"},
    {id:"c2",when:"19 Sep 2026",cls:"crit",label:"Chestnut specialist test day 09:00–13:00",hint:"Know score before CAF"},
    {id:"c3",when:"Sep–Oct",cls:"",label:"Open days (CLS, Harris, COLA, Habs, WCS, Dulwich, Globe, Oasis)",hint:"Trial real commute; note music/sport offer"},
    {id:"c4",when:"When open",cls:"",label:"Optional COLA IT aptitude form (2026)",hint:"Up to 24 specialist places. Public form link is still 2025 — 2026 form pending release."},
    {id:"c5",when:"Summer portal",cls:"",label:"Register Wandsworth Year 6 Test",hint:"Required for Chestnut general places"},
    {id:"c6",when:"Before 7 Oct",cls:"",label:"Lycée dossier ready; choose FR / SI–BFI vs British",hint:"British Section is separate and more expensive (~£21.5k)"},
    {id:"c7",when:"From 7 Oct",cls:"",label:"Open Lycée 6ème registration",hint:"French/SI track"},
    {id:"c8",when:"31 Oct 2026",cls:"crit",label:"Submit CAF preference order",hint:"True preference order · rank state schools"},
    {id:"c9",when:"By 31 Oct",cls:"crit",label:"Westminster City SIF (+ banding booking)",hint:"Also CAF name WCS"},
    {id:"c10",when:"2 Nov midday",cls:"ind",label:"Register Dulwich College 11+ (£200)",hint:"Tick Music / Sport scholarship interest if relevant"},
    {id:"c11",when:"2 Nov 2026",cls:"ind",label:"Register City of London School 11+",hint:"Include writing prep"},
    {id:"c12",when:"14 Nov 09:30",cls:"",label:"WCS banding test",hint:"At Westminster City School"},
    {id:"c13",when:"27 Nov 2026",cls:"ind",label:"CLS assessments",hint:"Online 105′ + writing 30′"},
    {id:"c14",when:"4 Dec 2026",cls:"ind",label:"Dulwich 11+ exams",hint:"Interview / music / sport callbacks in Jan if shortlisted"},
    {id:"c15",when:"~Mar 2027",cls:"",label:"Offers · accept / deposits · Harris scholarships post-offer",hint:"Coordinate state National Offer Day with independent deadlines"}
  ];

  var sortState = { key: "pref", dir: "asc", type: "num" };
  var altSort = { key: "quality", dir: "desc", type: "num" };

  function setSave(kind, text) {
    var el = document.getElementById("save-pill");
    el.className = "save-pill" + (kind ? " " + kind : "");
    el.textContent = text || "…";
  }

  function commuteHtml(mins) {
    var label = mins + "′";
    if (mins > 40) return '<span class="commute-long mono">' + label + "</span>";
    return '<span class="mono"><strong>' + label + "</strong></span>";
  }

  function feesHtml(fees, label) {
    if (!fees || fees <= 0) return '<span class="fees fees-free mono">Free</span>';
    var t = Math.max(0, Math.min(1, fees / FEE_MAX));
    var r, g, b;
    if (t < 0.45) {
      var u = t / 0.45;
      r = Math.round(22 + u * (200 - 22));
      g = Math.round(163 + u * (140 - 163));
      b = Math.round(74 + u * (20 - 74));
    } else {
      var u2 = (t - 0.45) / 0.55;
      r = Math.round(200 + u2 * (255 - 200));
      g = Math.round(140 * (1 - u2));
      b = Math.round(20 * (1 - u2));
    }
    return '<span class="fees mono" style="color:rgb(' + r + ',' + g + ',' + b + ');background:rgba(' + r + ',' + g + ',' + b + ',0.12)">' + label + '</span>';
  }

  function normalizePrefs(prefs) {
    var order = [], known = {};
    SCHOOLS.forEach(function (s) { known[s.id] = true; });
    if (Array.isArray(prefs)) {
      prefs.forEach(function (id) {
        if (known[id] && order.indexOf(id) < 0) order.push(id);
      });
    }
    SCHOOLS.forEach(function (s) {
      if (order.indexOf(s.id) < 0) order.push(s.id);
    });
    return order;
  }

  function scoreCell(val, barClass, highPrep) {
    var h = highPrep && val >= 70 ? " high" : "";
    return '<span class="score">' + val + '<small>/100</small></span><div class="bar ' + (barClass || "") + h + '"><i style="width:' + val + '%"></i></div>';
  }

  function badgeHtml(s) {
    var h = "";
    if ((s.badges || "").indexOf("state") >= 0) h += '<span class="badge b-state">State</span>';
    if ((s.badges || "").indexOf("ind") >= 0) h += '<span class="badge b-ind">Indep</span>';
    if ((s.badges || "").indexOf("fr") >= 0) h += '<span class="badge b-fr">French</span>';
    if ((s.badges || "").indexOf("intl") >= 0) h += '<span class="badge b-intl">Intl</span>';
    if ((s.badges || "").indexOf("boys") >= 0) h += '<span class="badge b-boys">Boys</span>';
    if ((s.badges || "").indexOf("warn") >= 0) h += '<span class="badge b-warn">Early</span>';
    return h;
  }

  function prefIndex(id) {
    var i = prefOrder.indexOf(id);
    return i < 0 ? 99 : i;
  }

  function getSorted(list, state, prefAware) {
    var rows = list.slice();
    var key = state.key, dir = state.dir === "asc" ? 1 : -1;
    rows.sort(function (a, b) {
      var av, bv;
      if (key === "pref") { av = prefIndex(a.id); bv = prefIndex(b.id); }
      else if (typeof a[key] === "string") { av = (a[key] || "").toLowerCase(); bv = (b[key] || "").toLowerCase(); }
      else { av = a[key]; bv = b[key]; }
      if (av < bv) return -1 * dir;
      if (av > bv) return 1 * dir;
      return prefAware ? prefIndex(a.id) - prefIndex(b.id) : 0;
    });
    return rows;
  }

  function renderDash() {
    var tbody = document.getElementById("dash-body");
    var rows = getSorted(SCHOOLS, sortState, true);
    tbody.innerHTML = rows.map(function (s) {
      var p = prefIndex(s.id) + 1;
      return "<tr>" +
        "<td><div class=\"pref-cell\"><span class=\"pref-num\">" + p + "</span><div class=\"pref-arrows\">" +
        "<button type=\"button\" data-move=\"" + s.id + "\" data-delta=\"-1\"" + (p === 1 ? " disabled" : "") + ">▲</button>" +
        "<button type=\"button\" data-move=\"" + s.id + "\" data-delta=\"1\"" + (p === prefOrder.length ? " disabled" : "") + ">▼</button>" +
        "</div></div></td>" +
        "<td class=\"school\">" + badgeHtml(s) + "<br>" + s.name + "<span class=\"short\">" + s.short + "</span></td>" +
        "<td class=\"tests-cell\">" + s.tests + "</td>" +
        "<td class=\"extra-cell\">" + s.open + "</td>" +
        "<td class=\"extra-cell\">" + s.deadline + "</td>" +
        "<td class=\"extra-cell\">" + s.scholar + "</td>" +
        "<td>" + scoreCell(s.quality, "") + "</td>" +
        "<td>" + scoreCell(s.admit, "lik") + "</td>" +
        "<td>" + scoreCell(s.prep, "prep", true) + "</td>" +
        "<td class=\"mono\">" + s.dist + " mi</td>" +
        "<td>" + commuteHtml(s.commute) + "</td>" +
        "<td>" + feesHtml(s.fees, s.feesLabel) + "</td>" +
        "<td>" + s.apply + "</td></tr>";
    }).join("");
    tbody.querySelectorAll("[data-move]").forEach(function (btn) {
      btn.addEventListener("click", function (e) {
        e.stopPropagation();
        movePref(btn.getAttribute("data-move"), parseInt(btn.getAttribute("data-delta"), 10));
      });
    });
    updateSortHeaders("#dash-table", sortState);
  }

  function renderAlts() {
    var tbody = document.getElementById("alt-body");
    var rows = getSorted(ALTS, altSort, false);
    tbody.innerHTML = rows.map(function (s) {
      return "<tr>" +
        "<td>" + scoreCell(s.quality, "") + "</td>" +
        "<td class=\"school\">" + s.name + "<span class=\"short\">" + s.short + "</span></td>" +
        "<td>" + s.why + "</td>" +
        "<td class=\"tests-cell\">" + s.tests + "</td>" +
        "<td>" + scoreCell(s.admit, "lik") + "</td>" +
        "<td>" + scoreCell(s.prep, "prep", true) + "</td>" +
        "<td class=\"mono\">" + s.dist + " mi</td>" +
        "<td>" + commuteHtml(s.commute) + "</td>" +
        "<td>" + feesHtml(s.fees, s.feesLabel) + "</td>" +
        "<td>" + s.notes + "</td></tr>";
    }).join("");
    updateSortHeaders("#alt-table", altSort);
  }

  function renderPlan() {
    var root = document.getElementById("plan-list");
    root.innerHTML = PLAN.map(function (item) {
      var done = !!checklist[item.id];
      return '<div class="tl ' + (item.cls || "") + (done ? " done" : "") + '">' +
        '<input type="checkbox" data-check="' + item.id + '"' + (done ? " checked" : "") + ' aria-label="' + item.label + '" />' +
        '<div class="when">' + item.when + "</div>" +
        '<div class="what"><strong>' + item.label + "</strong>" +
        (item.hint ? '<span class="hint">' + item.hint + "</span>" : "") +
        "</div></div>";
    }).join("");
    root.querySelectorAll("[data-check]").forEach(function (cb) {
      cb.addEventListener("change", function () {
        checklist[cb.getAttribute("data-check")] = cb.checked;
        cb.closest(".tl").classList.toggle("done", cb.checked);
        scheduleSave();
      });
    });
  }

  function renderComments() {
    var root = document.getElementById("comments-list");
    if (!comments.length) {
      root.innerHTML = '<p class="empty">No comments yet. Add feedback to improve this tool.</p>';
      return;
    }
    var sorted = comments.slice().sort(function (a, b) {
      return (b.at || "").localeCompare(a.at || "");
    });
    root.innerHTML = sorted.map(function (c) {
      var when = c.at ? new Date(c.at).toLocaleString() : "";
      var who = (c.name && c.name.trim()) ? escapeHtml(c.name.trim()) : "Anonymous";
      return '<div class="comment"><div class="who">' + who + '</div><div class="when">' + when +
        '</div><div class="body">' + escapeHtml(c.text || "") + "</div></div>";
    }).join("");
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function updateSortHeaders(tableSel, state) {
    document.querySelectorAll(tableSel + " th.sortable").forEach(function (th) {
      th.classList.remove("asc", "desc");
      if (th.getAttribute("data-key") === state.key) th.classList.add(state.dir);
    });
  }

  function setSort(which, key, type, forceDir) {
    var state = which === "alt" ? altSort : sortState;
    if (forceDir) { state.key = key; state.dir = forceDir; state.type = type; }
    else if (state.key === key) state.dir = state.dir === "asc" ? "desc" : "asc";
    else {
      state.key = key; state.type = type;
      state.dir = "desc";
      if (key === "pref" || key === "name" || key === "tests" || key === "why" || key === "notes" ||
          key === "open" || key === "deadline" || key === "scholar" || key === "commute" || key === "dist" || key === "prep" || key === "fees") {
        state.dir = "asc";
      }
      if (key === "quality" || key === "admit") state.dir = "desc";
    }
    if (which === "alt") renderAlts();
    else renderDash();
  }

  function movePref(id, delta) {
    var i = prefOrder.indexOf(id);
    if (i < 0) return;
    var j = i + delta;
    if (j < 0 || j >= prefOrder.length) return;
    var t = prefOrder[i]; prefOrder[i] = prefOrder[j]; prefOrder[j] = t;
    sortState = { key: "pref", dir: "asc", type: "num" };
    renderDash();
    scheduleSave();
  }

  function currentState() {
    return {
      v: 2,
      preferences: prefOrder.slice(),
      checklist: Object.assign({}, checklist),
      comments: comments.slice(),
      updatedAt: new Date().toISOString(),
      updatedBy: CLIENT_ID
    };
  }

  function applyState(state, fromRemote) {
    if (!state) return;
    applyingRemote = true;
    if (Array.isArray(state.preferences)) prefOrder = normalizePrefs(state.preferences);
    if (state.checklist && typeof state.checklist === "object") checklist = Object.assign({}, state.checklist);
    if (Array.isArray(state.comments)) comments = state.comments.slice();
    if (state.updatedAt) remoteUpdatedAt = state.updatedAt;
    renderDash();
    renderPlan();
    renderComments();
    applyingRemote = false;
    if (fromRemote && state.updatedAt) {
      var when = new Date(state.updatedAt).toLocaleString();
      var who = state.updatedBy === CLIENT_ID ? "you" : "shared";
      setSave("ok", "Last change " + when + " (" + who + ")");
    }
  }

  async function loadConfig() {
    try {
      var res = await fetch("sync-config.json?t=" + Date.now(), { cache: "no-store" });
      if (res.ok) syncCfg = await res.json();
    } catch (e) {}
    if (!syncCfg.endpoint) syncCfg.endpoint = "https://jsonblob.com/api/jsonBlob";
  }

  async function pullRemote() {
    await loadConfig();
    if (syncCfg.blobId) {
      try {
        var res = await fetch(syncCfg.endpoint + "/" + syncCfg.blobId + "?t=" + Date.now(), {
          cache: "no-store", headers: { Accept: "application/json" }
        });
        if (res.ok) {
          var data = await res.json();
          if (!remoteUpdatedAt || (data.updatedAt && data.updatedAt > remoteUpdatedAt)) {
            applyState(data, true);
          } else if (data.updatedAt === remoteUpdatedAt) {
            setSave("ok", "Up to date · last " + (remoteUpdatedAt ? new Date(remoteUpdatedAt).toLocaleString() : "—"));
          }
          return true;
        }
      } catch (e) {
        setSave("warn", "Cloud unreachable");
      }
    }
    try {
      var res2 = await fetch("state.json?t=" + Date.now(), { cache: "no-store" });
      if (res2.ok) {
        var backup = await res2.json();
        if (!remoteUpdatedAt || (backup.updatedAt && backup.updatedAt > remoteUpdatedAt)) {
          applyState(backup, true);
          setSave("warn", "Using backup · last " + (backup.updatedAt ? new Date(backup.updatedAt).toLocaleString() : "—"));
        }
        return true;
      }
    } catch (e2) {}
    setSave("err", "Offline");
    return false;
  }

  async function pushRemote() {
    if (applyingRemote) return;
    var state = currentState();
    setSave("", "Saving…");
    await loadConfig();
    if (!syncCfg.blobId) { setSave("err", "No sync config"); return; }
    try {
      var res = await fetch(syncCfg.endpoint + "/" + syncCfg.blobId, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify(state)
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      remoteUpdatedAt = state.updatedAt;
      setSave("ok", "Last change " + new Date(state.updatedAt).toLocaleString() + " (you)");
    } catch (e) {
      setSave("err", "Save failed");
    }
  }

  function scheduleSave() {
    if (applyingRemote) return;
    if (saveTimer) clearTimeout(saveTimer);
    setSave("", "Saving…");
    saveTimer = setTimeout(pushRemote, 400);
  }

  function showTab(id) {
    document.querySelectorAll(".panel").forEach(function (p) { p.classList.toggle("active", p.id === id); });
    document.querySelectorAll(".nav-btn").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-tab") === id);
    });
    try { history.replaceState(null, "", "#" + id); } catch (e) {}
    window.scrollTo(0, 0);
  }

  document.querySelectorAll(".nav-btn").forEach(function (b) {
    b.addEventListener("click", function () { showTab(b.getAttribute("data-tab")); });
  });
  document.querySelectorAll("#dash-table th.sortable").forEach(function (th) {
    th.addEventListener("click", function () { setSort("dash", th.getAttribute("data-key"), th.getAttribute("data-type")); });
  });
  document.querySelectorAll("#alt-table th.sortable").forEach(function (th) {
    th.addEventListener("click", function () { setSort("alt", th.getAttribute("data-key"), th.getAttribute("data-type")); });
  });
  document.getElementById("btn-sort-pref").addEventListener("click", function () { setSort("dash", "pref", "num", "asc"); });
  document.getElementById("btn-sort-quality").addEventListener("click", function () { setSort("dash", "quality", "num", "desc"); });
  document.getElementById("btn-alt-quality").addEventListener("click", function () { setSort("alt", "quality", "num", "desc"); });
  document.getElementById("btn-alt-commute").addEventListener("click", function () { setSort("alt", "commute", "num", "asc"); });
  document.getElementById("btn-reset-pref").addEventListener("click", function () {
    if (confirm("Reset preference order?")) {
      prefOrder = DEFAULT_PREF.slice();
      sortState = { key: "pref", dir: "asc", type: "num" };
      renderDash();
      scheduleSave();
    }
  });
  document.getElementById("btn-check-clear").addEventListener("click", function () {
    if (confirm("Clear all plan ticks?")) {
      checklist = {};
      renderPlan();
      scheduleSave();
    }
  });
  document.getElementById("btn-comment").addEventListener("click", function () {
    var text = (document.getElementById("c-text").value || "").trim();
    if (!text) return;
    var name = (document.getElementById("c-name").value || "").trim();
    comments.push({
      id: "cm-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6),
      text: text,
      name: name,
      at: new Date().toISOString(),
      clientId: CLIENT_ID
    });
    document.getElementById("c-text").value = "";
    renderComments();
    scheduleSave();
  });

  renderDash();
  renderAlts();
  renderPlan();
  renderComments();
  setSave("", "Connecting…");
  pullRemote().then(function () {
    setInterval(function () { pullRemote(); }, 4000);
  });

  var hash = (location.hash || "").replace("#", "");
  if (hash === "plan" || hash === "comments" || hash === "overview") showTab(hash);
  else if (hash === "timeline" || hash === "checklist" || hash === "steps") showTab("plan");
  else if (hash === "share" || hash === "compare") showTab("overview");
})();
</script>

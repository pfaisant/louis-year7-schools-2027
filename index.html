<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Se1Schools2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:#121820; --soft:#3a4553; --mute:#6b7785; --line:#dde3ea;
      --bg:#eef1f4; --panel:#fff; --navy:#153552; --navy2:#0f2740;
      --teal:#0a7a7e; --teal-bg:#e5f5f5; --amber:#b45309; --amber-bg:#fef3e2;
      --rose:#be123c; --rose-bg:#fce7ef; --scarlet:#ff0033; --scarlet-bg:#ffe5ea;
      --violet:#5b21b6; --violet-bg:#f3eefc; --green:#15803d; --green-bg:#e8f7ee;
      --r:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:"DM Sans",system-ui,sans-serif;font-size:13.5px;line-height:1.4;color:var(--ink);background:var(--bg)}
    a{color:var(--teal);text-underline-offset:2px} a:hover{color:var(--navy)}
    .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:.92em}

    .topbar{
      position:sticky;top:0;z-index:50;background:var(--navy2);color:#c8d6e4;
      display:flex;flex-wrap:wrap;align-items:center;gap:.5rem .75rem;
      padding:.55rem .9rem;border-bottom:1px solid rgba(255,255,255,.08);
    }
    .topbar h1{font-size:.95rem;font-weight:700;color:#fff;letter-spacing:-.02em}
    .topbar .meta{font-size:.7rem;color:#8fa3b8}
    .nav{display:flex;flex-wrap:wrap;gap:.3rem;flex:1}
    .nav-btn{border:0;background:transparent;color:#b8c9d9;font:inherit;font-size:.78rem;font-weight:600;padding:.4rem .7rem;border-radius:8px;cursor:pointer}
    .nav-btn:hover{background:rgba(255,255,255,.08);color:#fff}
    .nav-btn.active{background:var(--teal);color:#fff}
    .save-pill{margin-left:auto;font-size:.68rem;font-weight:600;color:#8fa3b8;padding:.25rem .55rem;border-radius:999px;background:rgba(255,255,255,.06);white-space:nowrap;max-width:100%}
    .save-pill.ok{color:#86efac}.save-pill.warn{color:#fcd34d}.save-pill.err{color:#fca5a5}

    .main{width:100%;padding:.75rem 1rem 2.5rem}
    .panel{display:none}.panel.active{display:block}
    .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:.35rem .5rem;margin-bottom:.55rem}
    .btn{display:inline-flex;align-items:center;gap:.25rem;font-size:.7rem;font-weight:700;padding:.3rem .55rem;border-radius:6px;border:1px solid var(--line);background:var(--panel);color:var(--navy);cursor:pointer;font-family:inherit;text-decoration:none;white-space:nowrap}
    .btn:hover{border-color:var(--teal);color:var(--teal)}
    .btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
    .btn-primary:hover{background:#086568;color:#fff}
    .btn-warn{background:var(--rose);color:#fff;border-color:var(--rose)}
    .section-label{font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);margin:1rem 0 .4rem}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);width:100%}
    table{width:100%;border-collapse:collapse;font-size:.72rem;min-width:1100px}
    th{text-align:left;background:var(--navy);color:#e8f0f6;font-size:.6rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:.48rem .4rem;white-space:nowrap;user-select:none;position:relative}
    th.sortable{cursor:pointer} th.sortable:hover{background:#1c4568}
    th .tip{display:inline-flex;align-items:center;justify-content:center;width:.85rem;height:.85rem;margin-left:.15rem;border-radius:50%;background:rgba(255,255,255,.18);font-size:.52rem;font-weight:700;cursor:help;vertical-align:middle}
    th[data-tip]:hover::after{content:attr(data-tip);position:absolute;left:0;top:100%;z-index:40;margin-top:.25rem;background:#0f172a;color:#f1f5f9;font-size:.66rem;font-weight:500;letter-spacing:0;text-transform:none;line-height:1.35;padding:.45rem .55rem;border-radius:6px;width:min(260px,70vw);box-shadow:0 8px 24px rgba(0,0,0,.25);white-space:normal;pointer-events:none}
    th.sortable .sort-ind{opacity:.45;margin-left:.08rem;font-size:.7em}
    th.sortable.asc .sort-ind,th.sortable.desc .sort-ind{opacity:1;color:#5eead4}
    th.sortable.asc .sort-ind::after{content:" ▲"} th.sortable.desc .sort-ind::after{content:" ▼"}
    th.sortable:not(.asc):not(.desc) .sort-ind::after{content:" ⇅"}
    td{padding:.4rem .4rem;border-bottom:1px solid var(--line);vertical-align:top;color:var(--soft)}
    tr:last-child td{border-bottom:0}
    tbody tr:nth-child(even) td{background:#f8fafb}
    tbody tr:hover td{background:#f0f7f7}
    td.school{font-weight:700;color:var(--ink);min-width:9rem}
    td.school .short{display:block;font-weight:500;font-size:.64rem;color:var(--mute);margin-top:.1rem}
    td.school .why{display:block;font-weight:500;font-size:.66rem;color:var(--soft);margin-top:.2rem;line-height:1.35}
    .tests-cell{max-width:12rem;line-height:1.35;font-size:.7rem}
    .extra-cell{max-width:10rem;line-height:1.35;font-size:.68rem;color:var(--mute)}
    .links-cell a{display:inline-block;margin:.08rem .2rem .08rem 0}

    .badge{display:inline-block;font-size:.52rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:.08rem .28rem;border-radius:4px;margin:0 .06rem .08rem 0}
    .b-state{background:var(--teal-bg);color:var(--teal)} .b-ind{background:var(--violet-bg);color:var(--violet)}
    .b-fr{background:var(--amber-bg);color:var(--amber)} .b-boys{background:#eef2f6;color:var(--soft)}
    .b-warn{background:var(--rose-bg);color:var(--rose)} .b-intl{background:#e0e7ff;color:#3730a3}
    .t-fr{background:#dbeafe;color:#1d4ed8} .t-de{background:#fef3c7;color:#b45309}
    .t-piano{background:#f3e8ff;color:#7e22ce} .t-foot{background:#dcfce7;color:#15803d}

    .score{display:inline-flex;align-items:baseline;gap:.08rem;font-family:"JetBrains Mono",monospace;font-weight:600;font-size:.82rem}
    .score small{font-size:.58rem;color:var(--mute);font-weight:500}
    .bar{height:4px;border-radius:3px;background:#e5e9ee;margin-top:.18rem;overflow:hidden;min-width:40px}
    .bar>i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--teal),#0d9488)}
    .bar.lik>i{background:linear-gradient(90deg,#0369a1,#0ea5e9)}
    .bar.prep>i{background:linear-gradient(90deg,var(--amber),#f59e0b)}
    .bar.prep.high>i{background:linear-gradient(90deg,var(--rose),#f43f5e)}
    .commute-long{color:var(--scarlet)!important;font-weight:700;background:var(--scarlet-bg);padding:.08rem .28rem;border-radius:4px;display:inline-block}
    .fees{font-weight:700;padding:.08rem .28rem;border-radius:4px;display:inline-block}
    .fees-free{color:var(--green);background:var(--green-bg)}

    .pref-cell{display:flex;align-items:center;gap:.2rem;min-width:4.2rem}
    .pref-num{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:.9rem;color:var(--navy);width:1.15rem;text-align:center}
    .pref-arrows{display:flex;flex-direction:column;gap:1px}
    .pref-arrows button{width:1.15rem;height:.9rem;border:1px solid var(--line);background:#fff;border-radius:3px;cursor:pointer;color:var(--navy);font-size:.48rem;line-height:1;padding:0;display:grid;place-items:center}
    .pref-arrows button:hover:not(:disabled){background:var(--teal-bg);border-color:var(--teal)}
    .pref-arrows button:disabled{opacity:.3;cursor:not-allowed}
    input[type=checkbox].on{width:1.05rem;height:1.05rem;accent-color:var(--teal);cursor:pointer}

    .alt-panel{display:none;margin-top:.35rem}
    .alt-panel.open{display:block}
    .alt-toggle{font-size:.75rem}

    .plan{display:grid;gap:.45rem;max-width:960px}
    .plan-empty{font-size:.8rem;color:var(--mute);padding:.75rem;background:var(--panel);border:1px solid var(--line);border-radius:10px}
    .tl{display:grid;grid-template-columns:auto 7rem 1fr;gap:.55rem;align-items:start;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.6rem .75rem}
    .tl.crit{border-color:#f0b4c4;background:#fff8f9}
    .tl.ind{border-color:#d4c4f5;background:#fbf8ff}
    .tl input[type=checkbox]{width:1.05rem;height:1.05rem;margin-top:.15rem;accent-color:var(--teal);cursor:pointer}
    .tl .when{font-family:"JetBrains Mono",monospace;font-size:.68rem;font-weight:600;color:var(--teal);padding-top:.12rem}
    .tl.crit .when{color:var(--rose)} .tl.ind .when{color:var(--violet)}
    .tl .what{font-size:.8rem;color:var(--soft)}
    .tl .what strong{color:var(--ink)}
    .tl.done{opacity:.55}
    .tl.done .what{text-decoration:line-through}
    .tl .hint{display:block;font-size:.7rem;color:var(--mute);margin-top:.2rem;line-height:1.4}
    .tl .links{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem}
    .tl .school-tag{font-size:.62rem;font-weight:700;color:var(--teal);background:var(--teal-bg);padding:.1rem .35rem;border-radius:4px;display:inline-block;margin-top:.25rem}

    .comment-form{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:.85rem;margin-bottom:.85rem;max-width:720px}
    .comment-form label{display:block;font-size:.72rem;font-weight:700;color:var(--mute);margin-bottom:.25rem}
    .comment-form input,.comment-form textarea{width:100%;font:inherit;padding:.45rem .55rem;border:1px solid var(--line);border-radius:8px;margin-bottom:.55rem;background:#fff;color:var(--ink)}
    .comment-form textarea{min-height:5.5rem;resize:vertical}
    .comments{display:grid;gap:.5rem;max-width:720px}
    .comment{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.65rem .8rem}
    .comment .who{font-size:.72rem;font-weight:700;color:var(--navy)}
    .comment .when{font-size:.65rem;color:var(--mute);font-family:"JetBrains Mono",monospace}
    .comment .body{font-size:.8rem;color:var(--soft);margin-top:.3rem;white-space:pre-wrap}
    .empty{font-size:.8rem;color:var(--mute);padding:.5rem 0}

    @media(max-width:700px){
      .topbar{padding:.5rem .65rem}
      .main{padding:.55rem .55rem 2rem}
      .tl{grid-template-columns:auto 1fr;gap:.4rem}
      .tl .when{grid-column:2}
      table{min-width:920px;font-size:.68rem}
      th[data-tip]:hover::after{left:auto;right:0}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>Se1Schools2027</h1>
    <span class="meta">SE17 1BS</span>
    <nav class="nav" aria-label="Main">
      <button type="button" class="nav-btn active" data-tab="overview">Shortlist</button>
      <button type="button" class="nav-btn" data-tab="plan">Plan</button>
      <button type="button" class="nav-btn" data-tab="comments">Comments</button>
    </nav>
    <div class="save-pill" id="save-pill">…</div>
  </header>

  <main class="main">
    <section id="overview" class="panel active">
      <div class="toolbar">
        <button type="button" class="btn" id="btn-sort-pref">Preference</button>
        <button type="button" class="btn" id="btn-sort-quality">Quality ↓</button>
        <button type="button" class="btn" id="btn-reset-pref">Reset pref</button>
        <button type="button" class="btn alt-toggle" id="btn-toggle-alts">Show alternatives</button>
      </div>

      <div class="table-wrap">
        <table id="dash-table">
          <thead>
            <tr>
              <th data-tip="Untick to drop school from shortlist into Alternatives. Plan only keeps tasks for schools still ticked.">On <span class="tip">?</span></th>
              <th class="sortable asc" data-key="pref" data-type="num" data-tip="Family ranking among shortlisted schools only. ▲▼ reorder.">Pref <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="name" data-type="str" data-tip="School + strength labels (FR / DE / Piano / Football) + why this school is plausible from SE17.">School <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="tests" data-type="str" data-tip="Application route and tests.">Admission / tests <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="open" data-type="str" data-tip="Open days / tours (2026 cycle where known).">Open days <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="deadline" data-type="str" data-tip="Key deadlines for 2027 entry.">Deadline <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="scholar" data-type="str" data-tip="Scholarships / specialist places.">Scholarships <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="quality" data-type="num" data-tip="Family quality estimate /100.">Quality <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="admit" data-type="num" data-tip="Rough offer chance /100 from SE17 1BS.">Admit <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="prep" data-type="num" data-tip="Prep load /100: low=CAF only; medium=specialist/dossier; high=full 11+.">Prep <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="dist" data-type="num" data-tip="Miles from SE17 1BS.">Dist <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="commute" data-type="num" data-tip="Avg door-to-door minutes. &gt;40′ scarlet.">Commute <span class="tip">?</span><span class="sort-ind"></span></th>
              <th class="sortable" data-key="fees" data-type="num" data-tip="Annual fees; green free → red high.">Fees /yr <span class="tip">?</span><span class="sort-ind"></span></th>
              <th data-tip="Direct links: apply, forms, open days, docs.">Links <span class="tip">?</span></th>
            </tr>
          </thead>
          <tbody id="dash-body"></tbody>
        </table>
      </div>

      <div class="alt-panel" id="alt-panel">
        <div class="section-label">Alternatives <span id="alt-count" style="font-weight:500;text-transform:none;letter-spacing:0"></span></div>
        <div class="toolbar">
          <button type="button" class="btn" id="btn-alt-quality">Quality ↓</button>
          <button type="button" class="btn" id="btn-alt-commute">Commute ↑</button>
        </div>
        <div class="table-wrap">
          <table id="alt-table">
            <thead>
              <tr>
                <th data-tip="Tick to move back onto the shortlist (and into the Plan).">On <span class="tip">?</span></th>
                <th class="sortable desc" data-key="quality" data-type="num" data-tip="Quality /100.">Quality <span class="tip">?</span><span class="sort-ind"></span></th>
                <th class="sortable" data-key="name" data-type="str" data-tip="Off-shortlist or never-shortlisted options.">School <span class="tip">?</span><span class="sort-ind"></span></th>
                <th class="sortable" data-key="why" data-type="str" data-tip="Why consider.">Why <span class="tip">?</span><span class="sort-ind"></span></th>
                <th class="sortable" data-key="tests" data-type="str" data-tip="Admission route.">Admission / tests <span class="tip">?</span><span class="sort-ind"></span></th>
                <th class="sortable" data-key="admit" data-type="num" data-tip="Admit chance /100.">Admit <span class="tip">?</span><span class="sort-ind"></span></th>
                <th class="sortable" data-key="prep" data-type="num" data-tip="Prep load /100.">Prep <span class="tip">?</span><span class="sort-ind"></span></th>
                <th class="sortable" data-key="dist" data-type="num" data-tip="Miles from SE17.">Dist <span class="tip">?</span><span class="sort-ind"></span></th>
                <th class="sortable" data-key="commute" data-type="num" data-tip="Avg minutes.">Commute <span class="tip">?</span><span class="sort-ind"></span></th>
                <th class="sortable" data-key="fees" data-type="num" data-tip="Annual fees.">Fees /yr <span class="tip">?</span><span class="sort-ind"></span></th>
                <th class="sortable" data-key="notes" data-type="str" data-tip="Fit notes.">Notes <span class="tip">?</span><span class="sort-ind"></span></th>
                <th>Links</th>
              </tr>
            </thead>
            <tbody id="alt-body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="plan" class="panel">
      <div class="toolbar">
        <button type="button" class="btn" id="btn-check-clear">Clear ticks</button>
        <span class="meta" id="plan-filter-hint" style="font-size:.72rem;color:var(--mute)"></span>
      </div>
      <div class="plan" id="plan-list"></div>
    </section>

    <section id="comments" class="panel">
      <div class="comment-form">
        <label for="c-name">Name (optional)</label>
        <input id="c-name" type="text" maxlength="80" placeholder="e.g. Paul" autocomplete="name" />
        <label for="c-text">Comment</label>
        <textarea id="c-text" maxlength="4000" placeholder="Feedback, corrections, ideas…"></textarea>
        <button type="button" class="btn btn-primary" id="btn-comment">Post comment</button>
      </div>
      <div class="comments" id="comments-list"></div>
    </section>
  </main>

  function commuteHtml(mins) {
    var label = mins + "′";
    if (mins > 40) return '<span class="commute-long mono">' + label + "</span>";
    return '<span class="mono"><strong>' + label + "</strong></span>";
  }

  function feesHtml(fees, label) {
    if (!fees || fees <= 0) return '<span class="fees fees-free mono">Free</span>';
    var t = Math.max(0, Math.min(1, fees / FEE_MAX));
    var r, g, b;
    if (t < 0.45) {
      var u = t / 0.45;
      r = Math.round(22 + u * (200 - 22));
      g = Math.round(163 + u * (140 - 163));
      b = Math.round(74 + u * (20 - 74));
    } else {
      var u2 = (t - 0.45) / 0.55;
      r = Math.round(200 + u2 * (255 - 200));
      g = Math.round(140 * (1 - u2));
      b = Math.round(20 * (1 - u2));
    }
    return '<span class="fees mono" style="color:rgb(' + r + ',' + g + ',' + b + ');background:rgba(' + r + ',' + g + ',' + b + ',0.12)">' + label + '</span>';
  }

  function scoreCell(val, barClass, highPrep) {
    var h = highPrep && val >= 70 ? " high" : "";
    return '<span class="score">' + val + '<small>/100</small></span><div class="bar ' + (barClass || "") + h + '"><i style="width:' + val + '%"></i></div>';
  }

  function badgeHtml(s) {
    var h = "";
    if ((s.badges || "").indexOf("state") >= 0) h += '<span class="badge b-state">State</span>';
    if ((s.badges || "").indexOf("ind") >= 0) h += '<span class="badge b-ind">Indep</span>';
    if ((s.badges || "").indexOf("fr") >= 0 && (s.badges || "").indexOf("state") < 0) h += '<span class="badge b-fr">French</span>';
    if ((s.badges || "").indexOf("intl") >= 0) h += '<span class="badge b-intl">Intl</span>';
    if ((s.badges || "").indexOf("boys") >= 0) h += '<span class="badge b-boys">Boys</span>';
    if ((s.badges || "").indexOf("warn") >= 0) h += '<span class="badge b-warn">Early</span>';
    return h;
  }

  function tagHtml(s) {
    var tags = s.tags || [];
    var h = "";
    if (tags.indexOf("fr") >= 0) h += '<span class="badge t-fr">FR</span>';
    if (tags.indexOf("de") >= 0) h += '<span class="badge t-de">DE</span>';
    if (tags.indexOf("piano") >= 0) h += '<span class="badge t-piano">Piano</span>';
    if (tags.indexOf("football") >= 0) h += '<span class="badge t-foot">Football</span>';
    return h;
  }

  function linksHtml(s) {
    if (!s.links || !s.links.length) return "—";
    return '<div class="links-cell">' + s.links.map(function (x) {
      return '<a class="btn" href="' + x.h + '" target="_blank" rel="noopener">' + x.l + "</a>";
    }).join(" ") + "</div>";
  }

  function prefIndex(id) {
    var i = shortlist.indexOf(id);
    return i < 0 ? 99 : i;
  }

  function getSorted(list, state, usePref) {
    var rows = list.slice();
    var key = state.key, dir = state.dir === "asc" ? 1 : -1;
    rows.sort(function (a, b) {
      var av, bv;
      if (key === "pref") { av = prefIndex(a.id); bv = prefIndex(b.id); }
      else if (typeof a[key] === "string") { av = (a[key] || "").toLowerCase(); bv = (b[key] || "").toLowerCase(); }
      else { av = a[key]; bv = b[key]; }
      if (av < bv) return -1 * dir;
      if (av > bv) return 1 * dir;
      return usePref ? prefIndex(a.id) - prefIndex(b.id) : 0;
    });
    return rows;
  }

  function renderDash() {
    var list = shortlistSchools();
    var rows = getSorted(list, sortState, true);
    var tbody = document.getElementById("dash-body");
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="14" style="padding:1rem;color:var(--mute)">No schools on shortlist. Open Alternatives and tick schools back on.</td></tr>';
    } else {
      tbody.innerHTML = rows.map(function (s) {
        var p = prefIndex(s.id) + 1;
        return "<tr>" +
          '<td><input class="on" type="checkbox" checked data-toggle="' + s.id + '" title="Untick → Alternatives" /></td>' +
          "<td><div class=\"pref-cell\"><span class=\"pref-num\">" + p + "</span><div class=\"pref-arrows\">" +
          '<button type="button" data-move="' + s.id + '" data-delta="-1"' + (p === 1 ? " disabled" : "") + ">▲</button>" +
          '<button type="button" data-move="' + s.id + '" data-delta="1"' + (p === shortlist.length ? " disabled" : "") + ">▼</button>" +
          "</div></div></td>" +
          '<td class="school">' + badgeHtml(s) + " " + tagHtml(s) + "<br>" + s.name +
          '<span class="short">' + s.short + "</span>" +
          (s.why ? '<span class="why">' + s.why + "</span>" : "") +
          "</td>" +
          '<td class="tests-cell">' + s.tests + "</td>" +
          '<td class="extra-cell">' + s.open + "</td>" +
          '<td class="extra-cell">' + s.deadline + "</td>" +
          '<td class="extra-cell">' + s.scholar + "</td>" +
          "<td>" + scoreCell(s.quality, "") + "</td>" +
          "<td>" + scoreCell(s.admit, "lik") + "</td>" +
          "<td>" + scoreCell(s.prep, "prep", true) + "</td>" +
          '<td class="mono">' + s.dist + " mi</td>" +
          "<td>" + commuteHtml(s.commute) + "</td>" +
          "<td>" + feesHtml(s.fees, s.feesLabel) + "</td>" +
          "<td>" + linksHtml(s) + "</td></tr>";
      }).join("");
    }
    bindTableToggles(tbody);
    tbody.querySelectorAll("[data-move]").forEach(function (btn) {
      btn.addEventListener("click", function (e) {
        e.stopPropagation();
        movePref(btn.getAttribute("data-move"), parseInt(btn.getAttribute("data-delta"), 10));
      });
    });
    updateSortHeaders("#dash-table", sortState);
    renderAlts();
    renderPlan();
    document.getElementById("btn-toggle-alts").textContent =
      (altsOpen ? "Hide" : "Show") + " alternatives (" + altSchools().length + ")";
  }

  function renderAlts() {
    var panel = document.getElementById("alt-panel");
    panel.classList.toggle("open", altsOpen);
    var list = altSchools();
    document.getElementById("alt-count").textContent = "(" + list.length + ")";
    var rows = getSorted(list, altSort, false);
    var tbody = document.getElementById("alt-body");
    tbody.innerHTML = rows.map(function (s) {
      return "<tr>" +
        '<td><input class="on" type="checkbox" data-toggle="' + s.id + '" title="Tick → Shortlist" /></td>' +
        "<td>" + scoreCell(s.quality, "") + "</td>" +
        '<td class="school">' + badgeHtml(s) + " " + tagHtml(s) + "<br>" + s.name +
        '<span class="short">' + s.short + "</span></td>" +
        "<td>" + (s.why || s.notes || "") + "</td>" +
        '<td class="tests-cell">' + s.tests + "</td>" +
        "<td>" + scoreCell(s.admit, "lik") + "</td>" +
        "<td>" + scoreCell(s.prep, "prep", true) + "</td>" +
        '<td class="mono">' + s.dist + " mi</td>" +
        "<td>" + commuteHtml(s.commute) + "</td>" +
        "<td>" + feesHtml(s.fees, s.feesLabel) + "</td>" +
        "<td>" + (s.notes || "") + "</td>" +
        "<td>" + linksHtml(s) + "</td></tr>";
    }).join("");
    bindTableToggles(tbody);
    updateSortHeaders("#alt-table", altSort);
  }

  function bindTableToggles(root) {
    root.querySelectorAll("[data-toggle]").forEach(function (cb) {
      cb.addEventListener("change", function () {
        var id = cb.getAttribute("data-toggle");
        if (cb.checked) addToShortlist(id);
        else removeFromShortlist(id);
      });
    });
  }

  function addToShortlist(id) {
    if (isOn(id)) return;
    shortlist.push(id);
    sortState = { key: "pref", dir: "asc", type: "num" };
    renderDash();
    scheduleSave();
  }

  function removeFromShortlist(id) {
    shortlist = shortlist.filter(function (x) { return x !== id; });
    sortState = { key: "pref", dir: "asc", type: "num" };
    renderDash();
    scheduleSave();
  }

  function movePref(id, delta) {
    var i = shortlist.indexOf(id);
    if (i < 0) return;
    var j = i + delta;
    if (j < 0 || j >= shortlist.length) return;
    var t = shortlist[i]; shortlist[i] = shortlist[j]; shortlist[j] = t;
    sortState = { key: "pref", dir: "asc", type: "num" };
    renderDash();
    scheduleSave();
  }

  function planVisible(item) {
    if (!item.schools || !item.schools.length) {
      // global tasks only if at least one shortlist school remains
      return shortlist.length > 0;
    }
    return item.schools.some(function (id) { return isOn(id); });
  }

  function renderPlan() {
    var root = document.getElementById("plan-list");
    var items = PLAN.filter(planVisible);
    var names = shortlistSchools().map(function (s) { return s.name; });
    document.getElementById("plan-filter-hint").textContent =
      shortlist.length ? ("Showing tasks for: " + names.join(", ")) : "Shortlist empty — add schools to see a plan.";
    if (!items.length) {
      root.innerHTML = '<div class="plan-empty">No plan items. Tick schools on the Shortlist (or empty shortlist).</div>';
      return;
    }
    root.innerHTML = items.map(function (item) {
      var done = !!checklist[item.id];
      var schoolBits = (item.schools || []).filter(isOn).map(function (id) {
        var s = byId(id);
        return s ? '<span class="school-tag">' + s.name + "</span>" : "";
      }).join(" ");
      var links = (item.links || []).map(function (x) {
        return '<a class="btn" href="' + x.h + '" target="_blank" rel="noopener">' + x.l + "</a>";
      }).join("");
      return '<div class="tl ' + (item.cls || "") + (done ? " done" : "") + '">' +
        '<input type="checkbox" data-check="' + item.id + '"' + (done ? " checked" : "") + ' />' +
        '<div class="when">' + item.when + "</div>" +
        '<div class="what"><strong>' + item.label + "</strong>" +
        (schoolBits ? "<div>" + schoolBits + "</div>" : "") +
        (item.hint ? '<span class="hint">' + item.hint + "</span>" : "") +
        (links ? '<div class="links">' + links + "</div>" : "") +
        "</div></div>";
    }).join("");
    root.querySelectorAll("[data-check]").forEach(function (cb) {
      cb.addEventListener("change", function () {
        checklist[cb.getAttribute("data-check")] = cb.checked;
        cb.closest(".tl").classList.toggle("done", cb.checked);
        scheduleSave();
      });
    });
  }

  function renderComments() {
    var root = document.getElementById("comments-list");
    if (!comments.length) {
      root.innerHTML = '<p class="empty">No comments yet.</p>';
      return;
    }
    var sorted = comments.slice().sort(function (a, b) { return (b.at || "").localeCompare(a.at || ""); });
    root.innerHTML = sorted.map(function (c) {
      var when = c.at ? new Date(c.at).toLocaleString() : "";
      var who = (c.name && c.name.trim()) ? escapeHtml(c.name.trim()) : "Anonymous";
      return '<div class="comment"><div class="who">' + who + '</div><div class="when">' + when +
        '</div><div class="body">' + escapeHtml(c.text || "") + "</div></div>";
    }).join("");
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function updateSortHeaders(sel, state) {
    document.querySelectorAll(sel + " th.sortable").forEach(function (th) {
      th.classList.remove("asc", "desc");
      if (th.getAttribute("data-key") === state.key) th.classList.add(state.dir);
    });
  }

  function setSort(which, key, type, forceDir) {
    var state = which === "alt" ? altSort : sortState;
    if (forceDir) { state.key = key; state.dir = forceDir; state.type = type; }
    else if (state.key === key) state.dir = state.dir === "asc" ? "desc" : "asc";
    else {
      state.key = key; state.type = type; state.dir = "asc";
      if (key === "quality" || key === "admit") state.dir = "desc";
    }
    if (which === "alt") renderAlts();
    else renderDash();
  }

  function normalizeShortlist(prefs) {
    var known = {};
    CATALOG.forEach(function (s) { known[s.id] = true; });
    var order = [];
    if (Array.isArray(prefs)) {
      prefs.forEach(function (id) {
        if (known[id] && order.indexOf(id) < 0) order.push(id);
      });
    }
    // If remote empty, use defaults that exist
    if (!order.length) {
      DEFAULT_SHORTLIST.forEach(function (id) {
        if (known[id]) order.push(id);
      });
    }
    return order;
  }

  /** Always an array. Fixes PowerShell/JSON single-item objects and bad remote shapes. */
  function normalizeComments(c) {
    if (!c) return [];
    if (Array.isArray(c)) {
      return c.filter(function (x) { return x && (x.text || x.id); }).map(function (x) {
        return {
          id: x.id || ("cm-" + Date.now() + "-" + Math.random().toString(36).slice(2, 6)),
          text: String(x.text || ""),
          name: String(x.name || ""),
          at: x.at || new Date().toISOString(),
          clientId: x.clientId || ""
        };
      });
    }
    // Single comment object mistakenly stored as object not array
    if (typeof c === "object" && (c.text || c.id)) {
      return normalizeComments([c]);
    }
    return [];
  }

  /** Union by id; never drop a comment that exists on either side. */
  function mergeComments(a, b) {
    var map = {};
    normalizeComments(a).concat(normalizeComments(b)).forEach(function (c) {
      if (!c.id) return;
      if (!map[c.id] || (c.at && map[c.id].at && c.at > map[c.id].at)) map[c.id] = c;
      else if (!map[c.id]) map[c.id] = c;
    });
    return Object.keys(map).map(function (k) { return map[k]; })
      .sort(function (x, y) { return (x.at || "").localeCompare(y.at || ""); });
  }

  function currentState() {
    return {
      v: 3,
      shortlist: shortlist.slice(),
      preferences: shortlist.slice(), // backward compat
      checklist: Object.assign({}, checklist),
      comments: normalizeComments(comments), // always array in storage
      updatedAt: new Date().toISOString(),
      updatedBy: CLIENT_ID
    };
  }

  function applyState(state, fromRemote) {
    if (!state) return;
    applyingRemote = true;
    var prefs = state.shortlist || state.preferences;
    if (Array.isArray(prefs)) shortlist = normalizeShortlist(prefs);
    if (state.checklist && typeof state.checklist === "object" && !Array.isArray(state.checklist)) {
      checklist = Object.assign({}, state.checklist);
    }
    // Merge remote comments into local so we never lose either side
    comments = mergeComments(comments, state.comments);
    if (state.updatedAt) remoteUpdatedAt = state.updatedAt;
    renderDash();
    renderComments();
    applyingRemote = false;
    if (fromRemote && state.updatedAt) {
      var when = new Date(state.updatedAt).toLocaleString();
      setSave("ok", "Last change " + when + (state.updatedBy === CLIENT_ID ? " (you)" : " (shared)"));
    }
  }

  async function loadConfig() {
    try {
      var res = await fetch("sync-config.json?t=" + Date.now(), { cache: "no-store" });
      if (res.ok) syncCfg = await res.json();
    } catch (e) {}
    if (!syncCfg.endpoint) syncCfg.endpoint = "https://jsonblob.com/api/jsonBlob";
  }

  async function pullRemote() {
    await loadConfig();
    if (syncCfg.blobId) {
      try {
        var res = await fetch(syncCfg.endpoint + "/" + syncCfg.blobId + "?t=" + Date.now(), {
          cache: "no-store", headers: { Accept: "application/json" }
        });
        if (res.ok) {
          var data = await res.json();
          if (!remoteUpdatedAt || (data.updatedAt && data.updatedAt > remoteUpdatedAt)) applyState(data, true);
          else if (data.updatedAt === remoteUpdatedAt)
            setSave("ok", "Up to date · last " + new Date(remoteUpdatedAt).toLocaleString());
          return true;
        }
      } catch (e) { setSave("warn", "Cloud unreachable"); }
    }
    try {
      var res2 = await fetch("state.json?t=" + Date.now(), { cache: "no-store" });
      if (res2.ok) {
        var backup = await res2.json();
        if (!remoteUpdatedAt || (backup.updatedAt && backup.updatedAt > remoteUpdatedAt)) {
          applyState(backup, true);
          setSave("warn", "Using backup");
        }
        return true;
      }
    } catch (e2) {}
    setSave("err", "Offline");
    return false;
  }

  async function pushRemote() {
    if (applyingRemote) return;
    setSave("", "Saving…");
    await loadConfig();
    if (!syncCfg.blobId) { setSave("err", "No sync config"); return; }
    // Re-read remote first and merge comments so a concurrent update cannot wipe them
    try {
      var getRes = await fetch(syncCfg.endpoint + "/" + syncCfg.blobId + "?t=" + Date.now(), {
        cache: "no-store", headers: { Accept: "application/json" }
      });
      if (getRes.ok) {
        var remote = await getRes.json();
        comments = mergeComments(comments, remote.comments);
      }
    } catch (e) { /* proceed with local */ }

    var state = currentState();
    try {
      var res = await fetch(syncCfg.endpoint + "/" + syncCfg.blobId, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify(state)
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      remoteUpdatedAt = state.updatedAt;
      comments = normalizeComments(state.comments);
      renderComments();
      setSave("ok", "Last change " + new Date(state.updatedAt).toLocaleString() + " (you)");
    } catch (e) {
      setSave("err", "Save failed");
    }
  }

  function scheduleSave() {
    if (applyingRemote) return;
    if (saveTimer) clearTimeout(saveTimer);
    setSave("", "Saving…");
    saveTimer = setTimeout(pushRemote, 400);
  }

  function showTab(id) {
    document.querySelectorAll(".panel").forEach(function (p) { p.classList.toggle("active", p.id === id); });
    document.querySelectorAll(".nav-btn").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-tab") === id);
    });
    try { history.replaceState(null, "", "#" + id); } catch (e) {}
    window.scrollTo(0, 0);
  }

  document.querySelectorAll(".nav-btn").forEach(function (b) {
    b.addEventListener("click", function () { showTab(b.getAttribute("data-tab")); });
  });
  document.querySelectorAll("#dash-table th.sortable").forEach(function (th) {
    th.addEventListener("click", function () { setSort("dash", th.getAttribute("data-key"), th.getAttribute("data-type")); });
  });
  document.querySelectorAll("#alt-table th.sortable").forEach(function (th) {
    th.addEventListener("click", function () { setSort("alt", th.getAttribute("data-key"), th.getAttribute("data-type")); });
  });
  document.getElementById("btn-sort-pref").addEventListener("click", function () { setSort("dash", "pref", "num", "asc"); });
  document.getElementById("btn-sort-quality").addEventListener("click", function () { setSort("dash", "quality", "num", "desc"); });
  document.getElementById("btn-alt-quality").addEventListener("click", function () { setSort("alt", "quality", "num", "desc"); });
  document.getElementById("btn-alt-commute").addEventListener("click", function () { setSort("alt", "commute", "num", "asc"); });
  document.getElementById("btn-reset-pref").addEventListener("click", function () {
    if (confirm("Reset shortlist to default order and set?")) {
      shortlist = DEFAULT_SHORTLIST.slice();
      sortState = { key: "pref", dir: "asc", type: "num" };
      renderDash();
      scheduleSave();
    }
  });
  document.getElementById("btn-toggle-alts").addEventListener("click", function () {
    altsOpen = !altsOpen;
    renderDash();
  });
  document.getElementById("btn-check-clear").addEventListener("click", function () {
    if (confirm("Clear all plan ticks?")) {
      checklist = {};
      renderPlan();
      scheduleSave();
    }
  });
  document.getElementById("btn-comment").addEventListener("click", function () {
    var text = (document.getElementById("c-text").value || "").trim();
    if (!text) return;
    comments.push({
      id: "cm-" + Date.now(),
      text: text,
      name: (document.getElementById("c-name").value || "").trim(),
      at: new Date().toISOString(),
      clientId: CLIENT_ID
    });
    document.getElementById("c-text").value = "";
    renderComments();
    scheduleSave();
  });

  renderDash();
  renderComments();
  setSave("", "Connecting…");
  pullRemote().then(function () {
    setInterval(function () { pullRemote(); }, 4000);
  });

  var hash = (location.hash || "").replace("#", "");
  if (hash === "plan" || hash === "comments" || hash === "overview") showTab(hash);
})();
</script>
</body>
</html>
